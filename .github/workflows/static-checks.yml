name: Static release checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Python checks
        run: python scripts/audit_all.py
      - name: Optional smoke tests
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run test:smoke
